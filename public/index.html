<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini S3</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel create-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Mini S3</p>
            <h1>Temporary resource share</h1>
          </div>
          <span id="healthBadge" class="badge">checking</span>
        </div>

        <form id="createShareForm" class="stack">
          <label>
            Share name
            <input name="name" value="Shared resources" autocomplete="off" />
          </label>

          <div class="grid">
            <label>
              Permission
              <select name="accessMode">
                <option value="upload">Upload</option>
                <option value="readonly">Readonly</option>
                <option value="edit">Edit</option>
              </select>
            </label>
            <label>
              Expiry hours
              <input name="expiresInHours" type="number" min="1" max="720" value="24" />
            </label>
            <label>
              Max file MB
              <input name="maxResourceMb" type="number" min="1" value="100" />
            </label>
          </div>

          <button type="submit">Create share</button>
        </form>

        <div id="createdShare" class="result" hidden>
          <span>Share URL</span>
          <a id="createdShareLink" href="#"></a>
        </div>
      </section>

      <section class="panel share-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Open share</p>
            <h2 id="shareTitle">No share selected</h2>
          </div>
          <span id="permissionBadge" class="badge">none</span>
        </div>

        <form id="openShareForm" class="inline-form">
          <input name="shareId" placeholder="share id" autocomplete="off" />
          <button type="submit">Open</button>
        </form>

        <form id="uploadForm" class="upload-box" hidden>
          <input id="fileInput" name="file" type="file" />
          <button type="submit">Upload file</button>
        </form>

        <div id="resourceList" class="resource-list"></div>
      </section>
    </main>

    <template id="resourceTemplate">
      <article class="resource-row">
        <div>
          <strong data-name></strong>
          <span data-meta></span>
        </div>
        <div class="actions">
          <a data-preview target="_blank" rel="noreferrer">Preview</a>
          <a data-download>Download</a>
          <button data-delete type="button">Delete</button>
        </div>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
