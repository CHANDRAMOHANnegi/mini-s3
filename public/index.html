<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini S3</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel create-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Mini S3</p>
            <h1>Temporary resource share</h1>
          </div>
          <span id="healthBadge" class="badge">checking</span>
        </div>

        <div class="stack">
          <div class="result">
            <span>Share this URL</span>
            <a id="currentShareLink" href="#"></a>
          </div>

          <label>
            Admin token
            <input id="adminTokenInput" type="password" autocomplete="off" placeholder="only if server requires it" />
          </label>

          <button id="newShareButton" type="button">New share URL</button>
        </div>
      </section>

      <section class="panel share-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">URL room</p>
            <h2 id="shareTitle">Opening share</h2>
          </div>
          <span id="permissionBadge" class="badge">full access</span>
        </div>

        <form id="uploadForm" class="upload-box">
          <input id="fileInput" name="file" type="file" />
          <button type="submit">Upload file</button>
        </form>

        <div id="resourceList" class="resource-list"></div>
      </section>
    </main>

    <template id="resourceTemplate">
      <article class="resource-row">
        <div>
          <strong data-name></strong>
          <span data-meta></span>
        </div>
        <div class="actions">
          <a data-preview target="_blank" rel="noreferrer">Preview</a>
          <a data-download>Download</a>
          <button data-delete type="button">Delete</button>
        </div>
      </article>
    </template>

    <script src="/public/app.js" type="module"></script>
  </body>
</html>
